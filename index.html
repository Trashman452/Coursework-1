<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body>
    <header>
        <span class="logo">Калькулятор для путешественника</span>
    </header>
    <section class="calc">
        <div class="container distance">
            <div class="sub-container">
                <span class="container-title">Длина</span>
                <button>Конвертировать</button>
            </div>

        </div>
        <div class="container weight">
            <div class="sub-container">
                <span class="container-title">Вес и масса</span>
                <button>Конвертировать</button>
            </div>

        </div>
        <div class="container currency">
            <div class="sub-container">
                <span class="container-title">Валюта</span>
                <div class="currency-buttons">
                    <button>Обновить курс</button>
                    <button>Конвертировать</button>
                </div>
            </div>

        </div>
        <div class="container budget-list">
            <div class="sub-container">
                <span class="container-title">Расчёт бюджета поездки</span>
                <button class="add-article" onclick="openForm()">
                    <img src="/img/plus_120249.svg" alt="Добавить статью">
                </button>

                <div class="add-article-form" id="article-form">
                    <button class="close-form-button" onclick="closeForm()">
                        <img src="/img/close_120246.svg" alt="Закрыть форму">
                    </button>

                    <form class="budget-form" id="budget-form" action="" method="get">
                        <div class="article-name-and-field">
                            <label for="article-name">Название статьи:</label>
                            <input type="text" name="article-name" id="article-name" placeholder="Введите название"
                                required>
                        </div>
                        <div class="money-count-field-and-currency-selection">
                            <label for="money-count">Сумма:</label>
                            <div>
                                <input type="number" name="article-price" id="article-price" placeholder="Введите сумму"
                                    required>
                                <select id="expenseCurrency">
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                    <option value="RUB">RUB</option>
                                </select>
                            </div>
                        </div>
                    </form>

                    <div class="form-button">
                        <button class="confirm-button" form="budget-form">Добавить статью</button>
                    </div>
                </div>
            </div>
            <div class="budget-list-footer">
                <span class="budget-list-result">Итого:</span>
                <button>Расчитать бюджет</button>
            </div>
        </div>
    </section>
    <script src="/script/script.js"></script>
</body>

</html>
