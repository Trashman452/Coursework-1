<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body>
    <header>
        <span class="logo">Калькулятор для путешественника</span>
    </header>
    <section class="calc">
        <div class="container distance">
            <div class="sub-container">
                <span class="container-title">Длина</span>
                <button>Конвертировать</button>
            </div>

        </div>
        <div class="container weight">
            <div class="sub-container">
                <span class="container-title">Вес и масса</span>
                <button>Конвертировать</button>
            </div>

        </div>
        <div class="container currency">
            <div class="sub-container">
                <span class="container-title">Валюта</span>
                <div class="currency-buttons">
                    <button>Обновить курс</button>
                    <button>Конвертировать</button>
                </div>
            </div>

        </div>
        <div class="container budget-list">
            <div class="sub-container">
                <span class="container-title">Расчёт бюджета поездки</span>
                <button class="add-article"><img src="/img/plus_120249.svg" alt="Добавить статью"></button>

                <div class="add-article-form">
                    <form action="" method="get">
                        <p>
                            <label for="article-name">Название статьи:
                                <input type="text" name="article-name" id="article-name" required>
                            </label>
                        </p>
                        <p>
                            <label for="money-count">Сумма:
                                <input type="number">
                            </label>
                        </p>
                    </form>
                </div>
            </div>
            <div class="budget-list-footer">
                <span class="budget-list-result">Итого:</span>
                <button>Расчитать бюджет</button>
            </div>
        </div>
    </section>
    <script src="/script/script.js"></script>
</body>

</html>
