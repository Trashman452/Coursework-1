<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body>
    <header>
        <span class="logo">Калькулятор для путешественника</span>
    </header>
    <section class="calc">
        <div class="container distance">
            <div class="sub-container">
                <span class="container-title">Длина</span>
            </div>
            <div class="main-container">
                <form class="length-form base-form-styles" id="length-form" action="" method="get">
                    <div class="base-form-elements-styles">
                        <label class="form-label" for="kilometers">Километры</label>
                        <input class="main-container-form-input" type="number" name="kilometers" id="kilometers"
                            value="0">
                    </div>
                    <div class="base-form-elements-styles">
                        <label class="form-label" for="miles">Мили</label>
                        <input class="main-container-form-input" type="number" name="miles" id="miles" value="0">
                    </div>
                </form>
            </div>
        </div>
        <div class="container weight">
            <div class="sub-container">
                <span class="container-title">Вес и масса</span>
            </div>
            <div class="main-container">
                <form class="weight-form base-form-styles" id="weight-form" action="" method="get">
                    <div class="base-form-elements-styles">
                        <label class="form-label" for="kilograms">Килограммы</label>
                        <input class="main-container-form-input" type="number" name="kilograms" id="kilograms"
                            value="0">
                    </div>
                    <div class="base-form-elements-styles">
                        <label class="form-label" for="pounds">Фунты</label>
                        <input class="main-container-form-input" type="number" name="pounds" id="pounds" value="0">
                    </div>
                </form>
            </div>
        </div>
        <div class="container currency">
            <div class="sub-container">
                <span class="container-title">Валюта</span>
                <div class="currency-buttons">
                    <button onclick="updateRates()">Обновить курс</button>
                    <button onclick="convertCurrency()">Конвертировать</button>
                </div>
            </div>
            <div class="currency-calc-window">
                <div class="main-container">
                    <div class="main-container-form">
                        <form class="currency-form base-form-styles" id="currency-form" action="" method="get">
                            <div class="base-form-elements-styles currency-form-emelents">
                                <label class="currency-selectors" for="currency-first">
                                    <select class="currency-select" id="fromCurrency">
                                        <option value="RUB">RUB</option>
                                        <option value="USD">USD</option>
                                        <option value="EUR">EUR</option>
                                    </select>
                                    <img class="selectors-image" src="/img/arrowright_120128.svg" alt="Направление конвертации">
                                    <select class="currency-select" id="toCurrency">
                                        <option value="USD">USD</option>
                                        <option value="EUR">EUR</option>
                                        <option value="RUB">RUB</option>
                                    </select>
                                </label>
                                <input class="main-container-form-input" type="number" name="currency-first"
                                    id="currency-first" value="0">
                            </div>
                        </form>
                    </div>
                    <div class="main-container-result">
                        <span class="currency-calc-result-title">Итого:</span>
                        <input class="currency-calc-result-input" type="text" id="currency-second" readonly>
                    </div>
                </div>
                <div class="currency-course-place">
                    <span class="courses-title">Курсы <span class="currency-update-time">(обновлены: <span id="lastUpdate"></span>)</span></span>
                    <div class="courses-block" id="exchangeRates">

                    </div>
                </div>
            </div>
        </div>
        <div class="container budget-list">
            <div class="sub-container">
                <span class="container-title">Расчёт бюджета поездки</span>
                <button class="add-article" onclick="openForm()">
                    <img src="/img/plus_120249.svg" alt="Добавить статью">
                </button>

                <div class="add-article-form" id="article-form">
                    <button class="close-form-button" onclick="closeForm()">
                        <img src="/img/close_120246.svg" alt="Закрыть форму">
                    </button>

                    <form class="budget-form" id="budget-form" action="" method="get">
                        <div class="article-name-and-field">
                            <label for="article-name">Название статьи:</label>
                            <input type="text" name="article-name" id="article-name" placeholder="Введите название"
                                required>
                        </div>
                        <div class="money-count-field-and-currency-selection">
                            <label for="money-count">Сумма:</label>
                            <div>
                                <input type="number" name="article-price" id="article-price" placeholder="Введите сумму"
                                    required>
                                <select id="expenseCurrency">
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                    <option value="RUB">RUB</option>
                                </select>
                            </div>
                        </div>
                    </form>

                    <div class="form-button">
                        <button class="confirm-button" form="budget-form">Добавить статью</button>
                    </div>
                </div>
            </div>
            <div class="budget-list-footer">
                <span class="budget-list-result-title">Итого:</span>
                <button>Расчитать бюджет</button>
            </div>
        </div>
    </section>
    <script src="/script/script.js"></script>
</body>

</html>
